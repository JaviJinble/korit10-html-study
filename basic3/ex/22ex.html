        function calc(run, ...num) {
            return run(num);
        };

        function addition(num) {
            return num === 0 ? 0 : num + addition(num - 1);
        };

        function factorial(num) {
            return num === 1 || num === 0 ? 1 : num * addition(num - 1);
        };

        calc(addition, 10);

        const result1 = calc(addition, 10);
        const result2 = calc(factorial, 10);

        const myMap = (arr, callback) => {
            const result = [];

            }
