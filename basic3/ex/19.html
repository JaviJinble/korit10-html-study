<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const sayHello2 = (name, greeting="안녕하세요.") => {
            return console.log(`${greeting } ${name}님!`);
        };

        const sayHello3 = (name, greeting) => {
            if (greeting === undefined) {
                greeting = "안녕하세요."

            }
            return console.log(`${greeting } ${name}님!`);
        };

        const sayHello = (name, greeting) => {
            return console.log(`${greeting ?? "안녕하세요."} ${name}님!`);
        };


        sayHello("명준");           // 출력: 안녕하세요, 준일님!
        sayHello("명준", "반갑습니다."); // 출력: 반갑습니다, 준일님!

        sayHello2("명준");           // 출력: 안녕하세요, 준일님!
        sayHello2("명준", "반갑습니다."); // 출력: 반갑습니다, 준일님!

        sayHello3("명준");           // 출력: 안녕하세요, 준일님!
        sayHello3("명준", "반갑습니다."); // 출력: 반갑습니다, 준일님!

    </script>
</body>

</html>
