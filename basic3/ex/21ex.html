<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // n의 팩토리얼(n!)을 재귀 함수로 계산하는 factorial 함수를 작성하시오.
        // n = 0일 때 1을 반환하는 기저 조건을 반드시 포함하시오.
        // 재귀함수 (반복적으로 자기 자신을 계속 호출하여 반복작업하는 함수패턴 -> 탈출조건을 확실하게 만들어야함.)
        function factorial(n) {
            // 1. 기저 조건
            if (n === 0 || n === 1) {
                return 1;
            }



            // 2. 재귀 호출
            return n * factorial(n - 1);
        }

    


        const factorial2 = (n) => {
            let result = 1;

            if (n === 0) {
                return result;
            }
            // !5 = 1 * 2 * 3 * 4 * 5 = 120;
            for (let i = 0; i < n; i++) {
                result *= n - i;
            };
            
            return result;
        };


        console.log(factorial2(5));


        console.log(factorial(0)); // 1
        console.log(factorial(5)); // 120
        console.log(factorial(7)); // 5040
    </script>
</body>

</html>
