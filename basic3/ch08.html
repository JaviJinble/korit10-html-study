<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,
        body {
            margin: 0;
            height: 100vh;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            margin: 0 auto;
            padding: 100px 0;
            width: 1200px;
            overflow: auto;
        }

        .card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 5px #00000044;
            padding: 20px;
        }

        .input-box {
            position: relative;
            margin-bottom: 15px;
            box-sizing: border-box;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 5px 10px;
            width: 360px;
            height: 50px;
            overflow: hidden;

            /* & > label은 부모 요소 */
            &>label {
                transition: all 0.3s ease-in-out;
                transform: translateY(-50%);
                position: absolute;
                top: 50%;
                left: 10px;
                background-color: transparent;
                font-size: 14px;
                color: #444;

            }

            &>input {
                transition: all 0.3s ease-in-out;
                position: relative;
                z-index: 10;
                outline: none;
                border: none;
                width: 100%;
                height: 100%;
                background-color: #00000000;
            }
        }



        .input-is-Not-empty {
            &>label {
                font-size: 12px;
                top: 25%;
            }

            &>input {
                top: 30%;
                height: 80%;
            }
        }

        .register-button {
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            border: 1px solid dbdbdb;
            border-radius: 4px;
            width: 100%;
            height: 40px;
            background-color: #006caf;
            color: #fafafa;
            cursor: pointer;

            &:hover {
                background-color: #005489;
            }

            &:active {
                background-color: #003e65;
            }
        }

        .option-items-top {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            width: 100%;
        }

        .search-input {
            box-sizing: border-box;
            padding: 0 10px;
            width: 300px;
        }

        .df-row {
            display: flex;
        }

        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            border: 1px solid dbdbdb;
            border-radius: 4px;
            padding: 8px 15px;
            background-color: #555555;
            color: #fafafa;
            cursor: pointer;

            &:hover {
                background-color: #444444;
            }

            &:active {
                background-color: #333333;
            }
        }

        .btn.edit {
            background-color: #ffaa00;
            &:hover {
                background-color: #e29700;
            }

            &:active {
                background-color: #be7f00;
            }
        }

        .btn.delete {
            background-color: #cb0000;
            &:hover {
                background-color: #b40000;
            }

            &:active {
                background-color: #910000;
            }
        }

        .user-table {
            box-sizing: border-box;
            border-collapse: collapse;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            width: 500px;
            overflow: hidden;

            & th,
            & td {
                box-sizing: border-box;
                border: 1px solid #dbdbdb;
                padding: 5px 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="input-box">
                <input type="text" id="un" name="username">
                <label for="un">사용자 이름</label>
            </div>
            <div class="input-box">
                <input type="password" id="pw" name="password">
                <label for="pw">비밀번호</label>
            </div>
            <button class="register-button">사용자 정보 등록</button>
        </div>

        <div>
            <div class="card">
                <div class="option-items-top">
                    <div class="df-row">
                        <input type="text" class="search-input" >
                        <button class="btn">검색</button>
                    </div>
                    <div class="df-row">
                        <button class="btn edit">수정</button>
                        <button class="btn delete">삭제</button>
                    </div>
                </div>
            </div>
            <div>
                <div class="card">
                    <table class="user-table">
                        <thead>
                            <tr>
                                <th><input type="checkbox"></th>
                                <th>ID</th>
                                <th>사용자 이름</th>
                                <th>비밀번호</th>
                                <th>삭제</th>
                            </tr>
                        </thead>
                        <tbody>

                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const registerButton = document.querySelector(".register-button");


        let userList = [];

        // 클로저 예제 - currentId는 함수 안에 있는 지역변수인데, 반환된 내부 함수가 계속 기억
        function autoIncrement() {
            let currentId = 0;

            return function () {
                currentId++;
                return currentId;
            }
        }

        const getNextId = autoIncrement();


        // .input-box 클래스를 가진 요소들을 전부 가져와.
        const inputBoxs = document.querySelectorAll(".input-box");

        for (let inputBox of inputBoxs) {
            const inputElement = inputBox.querySelector("input")

            inputElement.onfocus = (event) => {
                inputBox.classList.add("input-is-Not-empty")
            }

            inputElement.onblur = (event) => {
                if (!event.target.value) {
                    inputBox.classList.remove("input-is-Not-empty")
                }
            }
        }



        // registerButton.addEventListener("click", () => {
        //     // input 태그만 배열로 만들기
        //     // inputBoxs는 바로 배열이 아니라 NodeList라서 Array.from()으로 배열
        //     const inputs = Array.from(inputBoxs).map(inputBox => inputBox.querySelector("input"));

        //     // 새 사용자 객체 생성
        //     let newUser = {
        //         id: getNextId(),
        //     };

        //     inputs.forEach(element => {
        //         // input의 name과 value 추출 - 구조 분해 할당
        //         const { name, value } = element;

        //         newUser = {
        //             ...newUser,
        //             [name]: value,
        //         };
        //     });

        //     userList = [
        //         ...userList,
        //         newUser,
        //     ];

        //     console.log(userList);
        // });
        registerButton.onclick = () => {
            // input 태그만 배열로 만들기
            // inputBoxs는 바로 배열이 아니라 NodeList라서 Array.from()으로 배열
            const inputs = Array.from(inputBoxs).map(inputBox => inputBox.querySelector("input"));

            // 새 사용자 객체 생성
            let newUser = {
                id: getNextId(),
            };

            inputs.forEach(element => {
                // input의 name과 value 추출 - 구조 분해 할당
                const { name, value } = element;

                newUser = {
                    ...newUser,
                    [name]: value,
                };
            });

            userList = [
                ...userList,
                newUser,
            ];

            console.log(userList);

            tableRender();
        };

        function handleDeleteOnclick(id) {
            userList = userList.filter(user => user.id !== id);
            tableRender();
        }

        function tableRender() {
            const tbody = document.querySelector(".user-table > tbody");
            tbody.innerHTML = userList.map(user => `
            <tr>
                <th><input type="checkbox"></th>
                <td>${user.id}</td>
                <td>${user.username}</td>
                <td>${user.password}</td>   
                <td><button onclick = handleDeleteOnclick(${user.id}) >X<button></td>   
            </tr>
            `).join("");
        }



    </script>
</body>

</html>
