<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>이름</th>
            </tr>
        </thead>
        <tbody class="name-table-body">

        </tbody>
    </table>


    <script>
        // map(mapping) -> 일치하는 것을 1 : 1로 짝짓는다.(대응한다.)
        // [ 10, 20, 30 ] -> [ 100, 200, 300 ]
        // [ "명준", "명규", "민성" ] -> [ "김명준", "김명규", "김민성" ]
        // [ {name: "명준"}, {name: "명규"}, {name: "민성"},] -> [ "명준", "명규", "민성" ] 객체를 문자열로 변환도 가능 자료형이 달라질 수 도 있다.
        // 단, 1 : 1 이어야한다. 갯수를 유지되어야 한다.

        const arrayObject = {
            arr: [],
            map: (mapFx) => {
                console.log("1: " + mapFx);
                const newArray = [];
                console.log("2: " + arrayObject.arr);
                for (let i = 0; i < arrayObject.arr.length; i++) {
                    console.log("3: " + mapFx(arrayObject.arr[i]));
                    newArray.push(mapFx(arrayObject.arr[i]));
                }
                console.log("4: " + newArray);
                return newArray;
            },
            filter: (predicate) => {
                console.log("1: " + predicate);
                const newArray = [];
                console.log("2: " + arrayObject.arr);
                for (let i = 0; i < arrayObject.arr.length; i++) {
                    console.log("3: " + arrayObject.arr[i]);
                    if (predicate(arrayObject.arr[i])) {
                        newArray.push(arrayObject.arr[i]);
                    }
                }
                console.log("4: " + newArray);
                return newArray;
            }
        }

        const names = [ "명준", "명규", "민성" ];
        console.log(names);
        arrayObject.arr = names;
        console.log(arrayObject.map(name => "김" + name));

        console.log(arrayObject.filter(name => !name.includes("명")));


        const box1 = {
            miniBox: {
                content: "미니박스1",
            }
        };

        const box2 = {
            miniBox: {
                content: "미니박스2",
            }
        };

        const box3 = {
            miniBox: {
                content: "미니박스3",
            }
        };

        const boxList = [ box1, box2, box3, ];
        const miniBoxList = [ box1.miniBox, box2.miniBox, box3.miniBox, ];
        const miniBoxList2 = [];
        for(let box of boxList) {
            miniBoxList2.push(box.miniBox);
        };
        const miniBoxList3 = boxList.map(box => box.miniBox);
        const contents = boxList.map(box => box.miniBox.content);

        console.log(miniBoxList3);
        console.log(contents);

        const name = "김명준";
        const message = `${name}님 환영합니다.`;
        console.log(message);

        const namesList = [ "김명준", "김명규", "김민성" ];
        const namesTeg = namesList.map(name => `<tr><td>${name}</tr></td>`);

        console.log(namesTeg);


        const tableBody = document.querySelector(".name-table-body");
        console.log({tableBody});
        tableBody.innerHTML = namesList.map(name => `<tr><td>${name}</tr></td>`).join("");

    </script>
</body>
</html>
