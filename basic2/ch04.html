<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1 {
            width: 100px;
            height: 100px;
            background-color: black;
        }

        .box2 {
            display: inline-block;
            width: 100px;
            height: 100px;
            background-color: gray;
        }
        .box3 {
            width: 300px;
            height: 200px;
            background-color: skyblue;
        }
        .box3-1 {
            width: 70%;
            height: 50%;
            background-color: greenyellow;
        }
        .box3-2 {
            width: 100%;
            height: 50%;
            background-color: pink;
        }

    </style>
</head>
<body>
    <div class="box1"></div>
    <label class="box2">가나다라마바사</label>
    <label class="box2">가나다라마바사</label>
    <div class="box3">
        <div class="box3-1">
            <div class="box3-2" ></div>
        </div>
    </div>
</body>
</html>
