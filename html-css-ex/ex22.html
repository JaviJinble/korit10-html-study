<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문제22</title>
    <style>
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            background-color: #333;
        }
        li {
            display: inline-block;
        }
        a {
            display: block;
            color: white;
            padding: 14px 20px;
            text-decoration: none;
        }

        a:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <ul>
        <li><a href="#">홈</a></li>
        <li><a href="#">소개</a></li>
        <li><a href="#">서비스</a></li>
        <li><a href="#">문의</a></li>
    </ul>
</body>
</html>
