<div style="background:lightblue;">div는 block</div>
<div style="background:lightgreen;">div도 block</div>

<span style="background:lightyellow;">span은 inline</span>
<span style="background:lightpink;">span도 inline</span>

<span style="display:inline-block; width:150px; height:50px; background:lightcoral;">inline-block</span>
<span style="display:inline-block; width:150px; height:50px; background:lightsalmon;">inline-block</span>
<!-- 
block: 한 줄 전체를 차지하고 width, height 설정이 가능하다.
inline: 내용 크기만큼만 차지하고 width, height 설정이 적용되지 않는다.
inline-block: inline처럼 옆으로 배치되면서 block처럼 width, height 설정이 가능하다. -->
