<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>문제19</title>
    <style>
        .box {
            position: relative;
            left: 30px;
            top: 20px;
            width: 200px;
            padding: 20px;
            background-color: lightblue;
        }

        /* relative는 원래 있던 위치를 기준으로 이동한다.
           원래 자리 공간은 그대로 유지된다. */
    </style>
</head>
<body>
    <div class="box">이동하는 박스</div>
</body>
</html>
