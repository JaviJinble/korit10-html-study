<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>문제10</title>
</head>
<body>
    <form action="#" method="get">
        <div>
            <label>학년 선택</label>
            <select name="grade">
                <option>1학년</option>
                <option>2학년</option>
                <option>3학년</option>
                <option>4학년</option>
            </select>
        </div>

        <div>
            <label>프로그래밍 언어</label>
            <input type="text" list="language-list" name="language">
            <datalist id="language-list">
                <option value="Java">
                <option value="Python">
                <option value="JavaScript">
                <option value="C++">
                <option value="Go">
            </datalist>
        </div>
    </form>
</body>
</html>
