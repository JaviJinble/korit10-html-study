<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>문제20</title>
    <style>
        .parent {
            position: relative;
            width: 400px;
            height: 300px;
            border: 2px solid black;
        }

        .child {
            position: absolute;
            right: 10px;
            bottom: 10px;
            background-color: orange;
            padding: 10px;
        }

        /* 부모에 position: relative가 없으면
           자식 absolute 요소는 부모가 아니라
           body 또는 화면 기준으로 배치될 수 있다. */
    </style>
</head>
<body>
    <div class="parent">
        <div class="child">여기!</div>
    </div>
</body>
</html>
