<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문제30</title>
    <style>
        body {
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .login-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            padding: 40px;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 12px;
        }

        .input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .button {
            width: 100%;
            padding: 14px;
            background-color: #065A82;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <form>
            <h1>로그인</h1>

            <div>
                <label>아이디</label>
                <input type="text" class="input">
            </div>

            <div>
                <label>비밀번호</label>
                <input type="password" class="input">
            </div>

            <div>
                <input type="checkbox" id="remember">
                <label for="remember">아이디 기억하기</label>
            </div>

            <div>
                <button class="button">로그인</button>
            </div>

            <div>
                <p>계정이 없으신가요?</p>
                <a href="">회원가입</a>
            </div>
        </form>
    </div>
</body>

</html>
