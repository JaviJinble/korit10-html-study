<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문제25</title>
    <style>
        .product-card {
            position: relative;
            /*absolute 기준이 body 기준으로 튐. 배지가 카드 밖으로 가버림.
            넣으면: 부모(.product-card)를 기준으로 위치 잡힘*/
            width: 250px;
            padding: 20px;
            border: 1px solid #ddd;
        }
        .badge {
            position: absolute;
            top: 10px; 
            right: 10px;
            background-color: red;
            color: white;
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="product-card">
        <div class="badge">NEW</div>
        <h3>갤럭시 S25</h3>
        <p>1,200,000원</p>
    </div>
</body>
</html>
