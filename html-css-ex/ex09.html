<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>문제9</title>
</head>
<body>
    <form action="#" method="post">
        <div>
            <label>이름</label>
            <input type="text" name="name">
        </div>

        <div>
            <label>이메일</label>
            <input type="email" name="email">
        </div>

        <div>
            <label>비밀번호</label>
            <input type="password" name="password">
        </div>

        <div>
            <label>생년월일</label>
            <input type="date" name="birth">
        </div>

        <div>
            <label>성별</label>
            <input type="radio" name="gender" value="male"> 남
            <input type="radio" name="gender" value="female"> 여
        </div>

        <div>
            <label>관심분야</label>
            <input type="checkbox" name="interest" value="Java"> Java
            <input type="checkbox" name="interest" value="Python"> Python
            <input type="checkbox" name="interest" value="JavaScript"> JavaScript
        </div>

        <div>
            <label>자기소개</label><br>
            <textarea name="intro" rows="5" cols="40"></textarea>
        </div>

        <div>
            <input type="submit" value="가입하기">
        </div>
    </form>
</body>
</html>
