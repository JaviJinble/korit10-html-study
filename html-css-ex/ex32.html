<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심화2</title>
    <style>
        body {
            background-color: #333;
        }

        a {
            color: white;
            text-decoration: none;
        }

        ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .menu>li {
            display: inline-block;
            position: relative;
        }

        .submenu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: white;
            border: 1px solid #ddd;
            min-width: 150px;
            z-index: 10;
        }

        .menu>li:hover .submenu {
            display: block;
        }

        .submenu li {
            display: block;
        }

        .submenu a {
            color: black;
            padding: 10px 15px;
        }
    </style>
</head>

<body>
    <nav>
        <ul class="menu">
            <li>
                <a href="#">메뉴1</a>
                <ul class="submenu">
                    <li><a href="#">하위1-1</a></li>
                    <li><a href="#">하위1-2</a></li>
                    <li><a href="#">하위1-3</a></li>
                </ul>
            </li>
            <li>
                <a href="#">메뉴2</a>
                <ul class="submenu">
                    <li><a href="#">하위2-1</a></li>
                    <li><a href="#">하위2-2</a></li>
                </ul>
            </li>
            <li><a href="#">메뉴3</a></li>
        </ul>
    </nav>
</body>

</html>
