<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>문제15</title>
    <style>
        .tag {
            display: inline-block;
            width: 100px;
            height: 40px;
            background-color: #eee;
            text-align: center;
            line-height: 40px;
            margin: 5px;
        }

        /* inline 요소는 글자처럼 한 줄 안에서 배치되므로 width, height가 제대로 적용되지 않는다. */
    </style>
</head>
<body>
    <span class="tag">Java</span>
    <span class="tag">Python</span>
    <span class="tag">CSS</span>
</body>
</html>
